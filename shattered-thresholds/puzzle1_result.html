<!DOCTYPE html><html lang="en"><head>
    <meta charset="UTF-8">
    <link rel="icon" href="data:image/svg+xml,&lt;svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'&gt;&lt;text y='.9em' font-size='90'&gt;🕷️&lt;/text&gt;&lt;/svg&gt;">
    <title>The Ancient Door - Opened</title>
    <style>
        body {
            background-color: #1a1a1a;
            color: #b3b3b3;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 20px;
            background-image:
                radial-gradient(#333 1px, transparent 1px),
                radial-gradient(#333 1px, transparent 1px);
            background-size: 30px 30px;
            background-position: 0 0, 15px 15px;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .web-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 30px;
            background: #2a2a2a;
            border: 2px solid #4a4a4a;
            border-radius: 8px;
            position: relative;
            box-shadow: 0 0 20px rgba(128, 128, 128, 0.1);
            text-align: center;
        }

        .web-corner {
            position: absolute;
            width: 50px;
            height: 50px;
            border: 4px solid #4a4a4a;
            border-radius: 2px;
        }

        .web-corner-tl {
            top: -10px;
            left: -10px;
            border-right: none;
            border-bottom: none;
        }

        .web-corner-tr {
            top: -10px;
            right: -10px;
            border-left: none;
            border-bottom: none;
        }

        .web-corner-bl {
            bottom: -10px;
            left: -10px;
            border-right: none;
            border-top: none;
        }

        .web-corner-br {
            bottom: -10px;
            right: -10px;
            border-left: none;
            border-top: none;
        }

        h1 {
            color: #8a8a8a;
            text-align: center;
            font-size: 2.5em;
            margin-bottom: 30px;
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        p {
            font-size: 1.2em;
            line-height: 1.6;
            margin: 20px 0;
            padding: 10px;
            border-left: 3px solid #4a4a4a;
            transition: all 0.3s ease;
            text-align: center;
            background: #252525;
        }

        p:hover {
            background: #333;
            transform: translateX(10px);
            border-left-color: #666;
        }

        .spider-cursor {
            cursor: crosshair;
        }

        .ancient-text {
            font-family: 'Courier New', monospace;
            color: #666;
            font-style: italic;
            font-size: 0.8em;
            margin-top: 40px;
            text-align: center;
        }

        .ancient-text::before, .ancient-text::after {
            content: "✧";
            margin: 0 10px;
            color: #4a4a4a;
        }
    </style>
</head>

<body class="spider-cursor">
    <div class="web-container" id="response"><div class="web-corner web-corner-tl"></div>
<div class="web-corner web-corner-tr"></div>
<div class="web-corner web-corner-bl"></div>
<div class="web-corner web-corner-br"></div>

<h1>The door slides open. 🚪</h1>
<p>Cool breeze. Dim light. You step inside.</p>
<p>Whatever you’re doing — keep it weird, but quiet.</p></div>

    <script>
        document.title = "The Ancient Door - Opened";

        fetch("/resources/open.html")
          .then(res => res.text())
          .then(html => {
            document.getElementById("response").innerHTML = html;
          })
          .catch(err => console.error("Could not load content:", err));
  </script>

</body></html>
